<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- =============================================
       👇 YAHAN APNI CHEEZEIN CHANGE KAREIN
  ============================================= -->

  <!-- 1. Title jo Twitter card pe dikhe -->
  <meta property="og:title" content="Yeh dekho! 🔥">

  <!-- 2. Description jo neeche dikhe -->
  <meta property="og:description" content="Click karo aur dekho kya hai andar...">

  <!-- 3. Woh image jo Twitter pe preview mein dikhe -->
  <meta property="og:image" content="https://i.imgur.com/fiCdQGf.jpeg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- 4. Is page ki apni link (jahan aap yeh file host karein) -->
  <meta property="og:url" content="https://AAPKI-HOSTING-LINK.com/preview-redirect.html">

  <!-- Twitter specific tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Yeh dekho! 🔥">
  <meta name="twitter:description" content="Click karo aur dekho kya hai andar...">
  <meta name="twitter:image" content="https://i.imgur.com/fiCdQGf.jpeg">

  <!-- =============================================
       5. Asli website jahan user jaye click karne par
  ============================================= -->
  <meta http-equiv="refresh" content="0;url=https://omg10.com/4/6265520">

  <title>Redirecting...</title>
</head>
<body>
  <script>
    // Turant redirect karo
    window.location.replace("https://omg10.com/4/6265520");
  </script>

  <p style="font-family:sans-serif; text-align:center; margin-top:100px; color:#555;">
    Redirecting... <a href="https://omg10.com/4/6265520">Click here</a> if not redirected.
  </p>
</body>
</html>
